/* ── verify (fix-point quine proof) ── */
function openVerify(){
  reopenPanel=openVerify;
  var s1=buildSource();
  // simulate loading s1 then re-exporting: replace its block with normalized block again
  var s2 = DATA_RE.test(s1) ? s1.replace(DATA_RE, function(){ return dataBlock(); }) : s1;
  var fixOk = (s1===s2);
  var nBlocks = blockMatches(s1);
  var blockOk = (nBlocks===1);
  // data round-trip: parse the block we wrote, count records
  var roundOk=false, parsedN=0;
  try{
    var m=s1.match(/<script\b[^>]*\bid="akasha-records"[^>]*>([\s\S]*?)<\/script>/);
    if(m){ var p=JSON.parse(m[1].replace(/\\u003c/g,"<")); parsedN=(p.records||[]).length; roundOk=(parsedN===state.records.length); }
  }catch(e){ roundOk=false; }
  var kb=(s1.length/1024).toFixed(1);

  function row(ok,label,detail){
    return el("div",{class:"vrow "+(ok?"ok":"bad")},[
      el("span",{class:"mk",html: ok
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12l4 4 10-10"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 6l12 12M18 6L6 18"/></svg>'}),
      el("span",{},[el("b",{text:label}),document.createTextNode(" — "+detail)])
    ]);
  }
  var node=el("div",{style:"display:flex;flex-direction:column;height:100%"},[
    el("div",{class:"phead"},[ el("h2",{text:t("ver_title")}),
      el("button",{class:"btn icon ghost x",onclick:closeOverlay,"aria-label":t("close")},
        [el("span",{html:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>'})])]),
    el("div",{class:"pbody"},[
      el("div",{class:"verify"},[
        row(fixOk,  t("ver_fix"),   t(fixOk?"ver_fix_ok":"ver_fix_bad")),
        row(blockOk,t("ver_block"), t(blockOk?"ver_block_ok":"ver_block_bad")+" ("+nBlocks+")"),
        row(roundOk,t("ver_round"), (roundOk?t("ver_round_ok"):t("ver_round_bad"))+" ("+parsedN+"/"+state.records.length+")"),
      ]),
      el("div",{style:"margin-top:16px;color:var(--muted);font-size:13px"},[ t("ver_size")+": "+kb+" KB · "+state.records.length+" "+t("c_records") ])
    ]),
    el("div",{class:"pfoot"},[ el("button",{class:"btn gold",onclick:reincarnate},[t("reincarnate")]) ])
  ]);
  openOverlay(node,true);
}

/* ── stats ── */
function openStats(){
  reopenPanel=openStats;
  var n=state.records.length;
  var words=state.records.reduce(function(a,r){return a+wordCount(r.body);},0);
  var tagset={}; state.records.forEach(function(r){tagsOf(r).forEach(function(tg){tagset[tg]=1;});});
  var nTags=Object.keys(tagset).length;
  var dates=state.records.map(function(r){return +new Date(r.created);}).filter(function(x){return x;});
  var span = dates.length? Math.round((Math.max.apply(null,dates)-Math.min.apply(null,dates))/86400000)+1 : 0;
  var byCat={}; state.records.forEach(function(r){byCat[r.cat]=(byCat[r.cat]||0)+1;});
  var max=1; for(var k in byCat) max=Math.max(max,byCat[k]);

  function stat(v,k){ return el("div",{class:"stat"},[el("div",{class:"v",text:String(v)}),el("div",{class:"k",text:k})]); }
  var bars=el("div",{class:"bars"});
  CATS.forEach(function(c){
    var v=byCat[c.id]||0; if(!v) return;
    bars.appendChild(el("div",{class:"barrow"},[
      el("div",{class:"nm"},[el("span",{class:"dot",style:"background:"+c.color}),catName(c.id)]),
      el("div",{class:"track"},[el("i",{style:"width:"+(v/max*100)+"%;background:"+c.color})]),
      el("div",{class:"vv",text:String(v)})
    ]));
  });

  var node=el("div",{style:"display:flex;flex-direction:column;height:100%"},[
    el("div",{class:"phead"},[ el("h2",{text:t("st_title")}),
      el("button",{class:"btn icon ghost x",onclick:closeOverlay,"aria-label":t("close")},
        [el("span",{html:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>'})])]),
    el("div",{class:"pbody"},[
      el("div",{class:"stat-grid"},[ stat(n,t("st_total")), stat(words,t("st_words")), stat(nTags,t("st_tags")), stat(span,t("st_span")) ]),
      el("h3",{style:"font-family:var(--serif);font-size:16px;color:var(--ink);margin:6px 0 14px",text:t("st_bycat")}),
      bars
    ])
  ]);
  openOverlay(node,true);
}

/* ── about ── */
function openAbout(){
  reopenPanel=openAbout;
  function kbd(s){ return '<span class="kbd">'+s+'</span>'; }
  var shortcuts = kbd("n")+" "+esc(t("kx_new"))+" · "+kbd("/")+" "+esc(t("kx_search"))+
    " · "+kbd("Esc")+" "+esc(t("kx_close"))+" · "+kbd("Ctrl/⌘+S")+" "+esc(t("kx_reinc"));
  var html =
    '<p>'+t("ab_lead")+'</p>'+
    '<h3>'+esc(t("ab_h_data"))+'</h3>'+
    '<p>'+t("ab_p_data")+'</p>'+
    '<h3>'+esc(t("ab_h_fix"))+'</h3>'+
    '<p>'+t("ab_p_fix")+'</p>'+
    '<h3>'+esc(t("ab_h_keys"))+'</h3>'+
    '<p>'+shortcuts+'</p>'+
    '<h3>'+esc(t("ab_h_principles"))+'</h3>'+
    '<p>'+t("ab_p_principles")+'</p>';
  var node=el("div",{style:"display:flex;flex-direction:column;height:100%"},[
    el("div",{class:"phead"},[ el("span",{class:"sigil",style:"font-size:24px",text:"✦"}), el("h2",{text:t("ab_title")}),
      el("button",{class:"btn icon ghost x",onclick:closeOverlay,"aria-label":t("close")},
        [el("span",{html:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>'})])]),
    el("div",{class:"pbody about",html:html})
  ]);
  openOverlay(node,true);

/* ── JSON export/import + .html import ── */
function exportJson(){
  var payload={version:state.version||1, meta:state.meta, records:state.records};
  downloadFile(JSON.stringify(payload,null,2),"akasha-records.json","application/json");
  toast(t("t_exported"),"ok");
}
function importFile(){
  var inp=el("input",{type:"file",accept:".json,.html,application/json,text/html",style:"display:none"});
  inp.addEventListener("change",function(){
    var f=inp.files&&inp.files[0]; if(!f) return;
    var rd=new FileReader();
    rd.onload=function(){
      try{
        var txt=String(rd.result), data=null;
        if(/\.html?$/i.test(f.name) || /<script\b[^>]*akasha-records/.test(txt)){
          var m=txt.match(/<script\b[^>]*\bid="akasha-records"[^>]*>([\s\S]*?)<\/script>/);
          if(m) data=JSON.parse(m[1].replace(/\\u003c/g,"<"));
        } else { data=JSON.parse(txt); }
        if(!data || !Array.isArray(data.records)) throw new Error("bad");
        // merge by id (incoming wins), each record sanitized → no crashes, no seed hijack
        var byId=Object.create(null); state.records.forEach(function(r){byId[r.id]=r;});
        var added=0, updated=0;
        data.records.forEach(function(raw){
          var r=sanitizeRecord(raw); if(!r) return;
          if(byId[r.id]) updated++; else added++;
          byId[r.id]=r;
        });
        state.records=Object.keys(byId).map(function(k){return byId[k];});
        if(data.meta && typeof data.meta.stars==="boolean") state.meta.stars=data.meta.stars;
        markDirty(); render();
        toast(t("t_imported")+(added+updated)+" (+"+added+(updated?(" \u21BB"+updated):"")+")","gold");
      }catch(e){ toast(t("t_import_err"),"warn"); }
    };
    rd.readAsText(f);
  });
  document.body.appendChild(inp); inp.click(); setTimeout(function(){inp.remove();},1000);
}

/* ── clipboard ── */
function copyText(s){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(s).then(function(){toast(t("copied"),"ok");},function(){fallbackCopy(s);});
  } else fallbackCopy(s);
}
function fallbackCopy(s){
  try{ var ta=el("textarea",{}); ta.value=s; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); toast(t("copied"),"ok");
  }catch(e){}
}

/* ── toasts ── */
function toast(msg,kind,action){
  var icon = kind==="gold" ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l2.5 6L21 9.5l-5 4 1.5 6.5L12 16l-5.5 4L8 13.5 3 9.5 9.5 9z"/></svg>'
    : kind==="warn" ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4m0 4h.01M10.3 3.9L2 18a1.7 1.7 0 001.5 2.5h17A1.7 1.7 0 0022 18L13.7 3.9a1.7 1.7 0 00-3 0z"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12l4 4 10-10"/></svg>';
  var n=el("div",{class:"toast "+(kind||"ok"),role:"status"},[el("span",{html:icon}),document.createTextNode(msg)]);
  if(action && typeof action.fn==="function"){
    n.appendChild(el("button",{class:"toast-act",type:"button",onclick:function(){ try{action.fn();}finally{ n.remove(); } }},[action.label||"↶"]));
  }
  $("#toasts").appendChild(n);
  var life = action ? 6000 : 2600;
  setTimeout(function(){ n.style.transition="opacity .3s, transform .3s"; n.style.opacity="0"; n.style.transform="translateY(8px)"; setTimeout(function(){n.remove();},320); },life);
}

/* ── starfield ── */
var starsCanvas=$("#stars"), starCtx=null, starsRAF=null, starsArr=[], starsInit=false, starsReduce=false;
function starsResize(){
  if(!starCtx) return;
  var dpr=Math.min(window.devicePixelRatio||1,2);
  starsCanvas.width=Math.floor(innerWidth*dpr); starsCanvas.height=Math.floor(innerHeight*dpr);
  starsCanvas.style.width=innerWidth+"px"; starsCanvas.style.height=innerHeight+"px";
  starCtx.setTransform(dpr,0,0,dpr,0,0);
  var count=Math.min(150, Math.floor(innerWidth*innerHeight/9000));
  starsArr=[]; for(var i=0;i<count;i++){
    starsArr.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,
      r:Math.random()*1.3+.2,a:Math.random()*.6+.15,
      vy:(Math.random()*.12+.02),tw:Math.random()*Math.PI*2,gold:Math.random()<.18});
  }
}
function starsFrame(){
  // stop cleanly when toggled off or no context (jsdom/no-canvas)
  if(!state.meta.stars || !starCtx){ starsRAF=null; return; }
  starCtx.clearRect(0,0,innerWidth,innerHeight);
  for(var i=0;i<starsArr.length;i++){ var s=starsArr[i];
    if(!starsReduce){ s.y+=s.vy; s.tw+=0.02; if(s.y>innerHeight+2){s.y=-2;s.x=Math.random()*innerWidth;} }
    var al=s.a*(0.6+0.4*Math.sin(s.tw));
    starCtx.beginPath(); starCtx.arc(s.x,s.y,s.r,0,6.283);
    starCtx.fillStyle = s.gold ? "rgba(216,179,119,"+al+")" : "rgba(220,228,255,"+al+")";
    starCtx.fill();
  }
  if(starsReduce){ starsRAF=null; return; } // reduced motion: draw once, no loop
  starsRAF=requestAnimationFrame(starsFrame);
}
function initStars(){
  if(starsInit) return;                       // guard: build listeners/context once
  try{ starCtx=starsCanvas.getContext("2d"); }catch(e){ starCtx=null; }
  if(!starCtx) return;                         // jsdom / no-canvas: bail, never throws
  starsInit=true;
  try{ starsReduce=!!(window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches); }catch(e){ starsReduce=false; }
  window.addEventListener("resize",function(){ if(starCtx && state.meta.stars){ starsResize(); if(starsReduce) starsFrame(); } });
  starsResize();
}
function applyStars(){
  var on=!!state.meta.stars;
  starsCanvas.style.display=on?"block":"none";
  if(on){
    initStars();
    if(starCtx && !starsRAF) starsFrame();    // start, or restart after a clean stop
  }
  var st=$("[data-act='stars'] span"); if(st) st.textContent=t(on?"m_stars_on":"m_stars_off");
}

/* ── menu wiring ── */
var menu=$("#menu");
function setMenu(open){ menu.classList.toggle("open",!!open); var b=$("#menuBtn"); if(b) b.setAttribute("aria-expanded",open?"true":"false"); }
$("#menuBtn").addEventListener("click",function(e){ e.stopPropagation(); setMenu(!menu.classList.contains("open")); });
document.addEventListener("click",function(e){ if(!menu.contains(e.target) && e.target.id!=="menuBtn") setMenu(false); });
menu.addEventListener("click",function(e){
  var b=e.target.closest("button[data-act]"); if(!b) return;
  setMenu(false);
  var act=b.getAttribute("data-act");
  if(act==="source") openSource();
  else if(act==="verify") openVerify();
  else if(act==="stats") openStats();
  else if(act==="exportJson") exportJson();
  else if(act==="importJson") importFile();
  else if(act==="about") openAbout();
  else if(act==="stars"){ state.meta.stars=!state.meta.stars; markDirty(); applyStars(); }
});

/* ── language ── */
(function(){
  var sel=$("#langSel");
  LANGS.forEach(function(L){
    sel.appendChild(el("option",{value:L[0]},[L[1]]));
  });
  sel.value=ui.lang;
  sel.addEventListener("change",function(){
    ui.lang=sel.value;
    if(state.meta) state.meta.lang=ui.lang;
    localizeSeeds();
    applyI18nStatic(); render();
    if(reopenPanel && /\bshow\b/.test(scrim.className)) reopenPanel();
  });
})();

/* ── top controls ── */
$("#newBtn").addEventListener("click",function(){ openEditor(null); });
$("#dlBtn").addEventListener("click",reincarnate);
var qDeb=null;
$("#q").addEventListener("input",function(e){ ui.q=e.target.value; clearTimeout(qDeb); qDeb=setTimeout(renderList,90); });
$("#sortSel").addEventListener("change",function(e){ ui.sort=e.target.value; renderList(); });

/* ── keyboard ── */
document.addEventListener("keydown",function(e){
  var open=scrim.classList.contains("show");
  if(open && e.key==="Tab"){                       // trap focus inside the dialog
    var f=focusables();
    if(f.length){ var first=f[0], last=f[f.length-1], a=document.activeElement;
      if(e.shiftKey && (a===first || !panelEl.contains(a))){ e.preventDefault(); last.focus(); }
      else if(!e.shiftKey && (a===last || !panelEl.contains(a))){ e.preventDefault(); first.focus(); }
    }
    return;
  }
  if((e.ctrlKey||e.metaKey) && (e.key==="s"||e.key==="S")){ e.preventDefault(); reincarnate(); return; }
  if(e.key==="Escape"){ if(open) closeOverlay("escape"); else setMenu(false); return; }
  var typing=/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement&&document.activeElement.tagName);
  if(typing || open) return;                        // suppress single-key shortcuts while typing or in a dialog
  if(e.key==="n"||e.key==="N"){ e.preventDefault(); openEditor(null); }
  else if(e.key==="/"){ e.preventDefault(); $("#q").focus(); }
});

/* ── unsaved guard ── */
window.addEventListener("beforeunload",function(e){
  if(dirty){ e.preventDefault(); e.returnValue=t("unsaved"); return t("unsaved"); }
});

/* ── restore banner (autosave newer than embedded) ── */
function maybeOfferRestore(){
  var as=readAutosave();
  if(!as || !as.state || !Array.isArray(as.state.records)) return;
  // offer only if it actually differs from embedded
  var a=JSON.stringify(as.state.records), b=JSON.stringify(state.records);
  if(a===b) return;
  var banner=$("#banner"); banner.classList.add("show");
  $("#restoreYes").onclick=function(){ state=as.state; if(!state.meta)state.meta={stars:true};
    if(state.meta.lang && DICT[state.meta.lang]) ui.lang=state.meta.lang;
    banner.classList.remove("show"); dirty=true;
    localizeSeeds(); applyI18nStatic(); applyStars(); render(); toast(t("t_restored"),"gold"); };
  $("#restoreNo").onclick=function(){ banner.classList.remove("show"); try{ localStorage.removeItem(AUTOSAVE_KEY); }catch(e){} };
}

/* ── boot ── */
$("#ver").textContent="v"+VERSION;
$("#sortSel").value=ui.sort;
if(state.meta && state.meta.lang && DICT[state.meta.lang]) ui.lang=state.meta.lang;
localizeSeeds();
applyI18nStatic();
applyStars();
render();
maybeOfferRestore();

/* ── tiny test hook (harmless; aids power users & audits) ── */
window.__akasha={ getState:function(){return state;}, setState:function(s){state=s;invalidateSearchIndex();render();},
  buildSource:buildSource, dataBlock:dataBlock, blockMatches:blockMatches,
  sanitizeRecord:sanitizeRecord, tagsOf:tagsOf, localizeSeeds:localizeSeeds,
  del:del, openEditor:openEditor, openDetail:openDetail, filtered:filtered, uid:uid };

})();
</script>
